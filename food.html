    <main id = "main">
    <div class="controls-wrap">
        <div class="filter-group">
            <h3>Show All</h3>
            <button type="button" class="control" data-filter="all">All</button>
        </div>

        <div class="filter-group">
            <details><summary><h3>Sort by Week</h3></summary>
            <button type="button" class="control" data-filter=".week1">Week 1</button>
            <button type="button" class="control" data-filter=".week2">Week 2</button>
            <button type="button" class="control" data-filter=".week3">Week 3</button>
            </details>
        </div>

        <div class="filter-group">
            <details><summary><h3>Sort by Type</h3></summary>
                
            <button type="button" class="control" data-filter=".dessert">Dessert</button>
            <button type="button" class="control" data-filter=".mexican">Mexican</button>
            <button type="button" class="control" data-filter=".drinks">Drinks</button>
            <button type="button" class="control" data-filter=".breakfast">Breakfast</button>
            <button type="button" class="control" data-filter=".sandwich">Sandwich</button>
            <button type="button" class="control" data-filter=".fried">Fried / Takeout</button>
            </details>
        </div>

        <div class="filter-group">
            <details><summary><h3>Sort by Place</h3></summary>
            <button type="button" class="control" data-filter=".inner-dublin">Inner Dublin</button>
            <button type="button" class="control" data-filter=".galway">Galway</button>
            <button type="button" class="control" data-filter=".howth">Howth</button>
            <button type="button" class="control" data-filter=".belfast">Belfast</button>
            </details>
        </div>
    </div>

    <div class="container">

        <div class="mix week1 fried howth">
            <figure>
                <a href="images/food/pizza1.JPG"
                   data-lightbox="food"
                   data-title="📍 Mercato · Pepperoni Pizza · Mercato was right outside of the train station and it was a great meal before the hike">
                    <img src="images/food/pizza1.JPG" alt="Sliced Pepperoni Pizza in cardboard box">
                </a>
                <figcaption>📍 Mercato — Pepperoni Pizza</figcaption>
            </figure>
        </div>

        <div class="mix week1 dessert inner-dublin">
            <figure>
                <a href="images/food/rollingdonut.JPG"
                   data-lightbox="food"
                   data-title="📍 The Rolling Donut · Apple Crumble Donut · This donut was delicious! I love all things apple and this donut was filled with a delicious cinnamon filling">
                    <img src="images/food/rollingdonut.JPG" alt="Apple Crumble Donut on napkin infront of black paper bag">
                </a>
                <figcaption>📍 The Rolling Donut — Apple Crumble Donut</figcaption>
            </figure>
        </div>

        <div class="mix week1 drinks inner-dublin">
            <figure>
                <a href="images/food/longisland.JPG"
                   data-lightbox="food"
                   data-title="📍 River Bar · Long Island Iced Tea · This drink was $18. There's not much else to say.">
                    <img src="images/food/longisland.JPG" alt="Long Island Iced Tea on a coaster with bar in the background">
                </a>
                <figcaption>📍 River Bar — Long Island Iced Tea</figcaption>
            </figure>
        </div>

        <div class="mix week2 breakfast inner-dublin">
            <figure>
                <a href="images/food/pancakes1.JPG"
                   data-lightbox="food"
                   data-title="📍 Bittersweet Cafe · Pancakes · This looked delicious but unfortunately my pancakes were a bit burnt for my taste">
                    <img src="images/food/pancakes1.JPG" alt="4 pancakes with powdered sugar, syrup, and banana on a white plate">
                </a>
                <figcaption>📍 Bittersweet Cafe — Pancakes</figcaption>
            </figure>
        </div>

        <div class="mix week1 sandwich inner-dublin">
            <figure>
                <a href="images/food/sandwich1.JPG"
                   data-lightbox="food"
                   data-title="📍 Little Genos's · Chicken Parmigiana · I'm not usually a chicken parm person but the chicken was delicious. A bit too much pesto though.">
                    <img src="images/food/sandwich1.JPG" alt="Sandwich in green plastic basket">
                </a>
                <figcaption>📍 Little Genos's — Chicken Parmigiana</figcaption>
            </figure>
        </div>

        <div class="mix week2 fried inner-dublin">
            <figure>
                <a href="images/food/fish1.JPG"
                   data-lightbox="food"
                   data-title="📍 Leo Burdock · Fish and Chips · I enjoyed this overall, probably my favorite fish and chips from the trip">
                    <img src="images/food/fish1.JPG" alt="Fish and Chips on white paper">
                </a>
                <figcaption>📍 Leo Burdock — Fish and Chips</figcaption>
            </figure>
        </div>

        <div class="mix week2 fried inner-dublin">
            <figure>
                <a href="images/food/pizza2.JPG"
                   data-lightbox="food"
                   data-title="📍 Fireaway Pizza · Pepperoni Pizza · This was one of the best deals I found! €7.99 for 2-toppings!">
                    <img src="images/food/pizza2.JPG" alt="Pepperoni Pizza in front of a window">
                </a>
                <figcaption>📍 Fireaway Pizza — Pepperoni Pizza</figcaption>
            </figure>
        </div>

        <div class="mix week1 fried inner-dublin">
            <figure>
                <a href="images/food/fish2.JPG"
                   data-lightbox="food"
                   data-title="📍 The Brazen Head · Fish and Chips · First meal in Dublin! Delicious at the 'oldest' pub in Dublin">
                    <img src="images/food/fish2.JPG" alt="Fish and Chips on a plate with a lemon wedge and tartar sauce">
                </a>
                <figcaption>📍 The Brazen Head — Fish and Chips</figcaption>
            </figure>
        </div>

        <div class="mix week2 breakfast inner-dublin">
            <figure>
                <a href="images/food/acai.JPG"
                   data-lightbox="food"
                   data-title="📍 Couple of Mugs Coffee · Acai Bowl· I love acai bowls and this one was pretty tasty. They were pretty generous with the toppings">
                    <img src="images/food/acai.JPG" alt="Acai bowl topped with banana, strawberries, and granola">
                </a>
                <figcaption>📍 Couple of Mugs Coffee — Acai Bowl</figcaption>
            </figure>
        </div>

        <div class="mix week2 breakfast sandwich inner-dublin">
            <figure>
                <a href="images/food/bagel.JPG"
                   data-lightbox="food"
                   data-title="📍 Bounceback Cafe · Egg & Cheese Bagel · Honestly my favorite meal here! This was very filling and delicious.">
                    <img src="images/food/bagel.JPG" alt="Bagel sandwich with cheese and spinach">
                </a>
                <figcaption>📍 Bounceback Cafe — Egg & Cheese Bagel </figcaption>
            </figure>
        </div>

        <div class="mix week2 dessert galway">
            <figure>
                <a href="images/food/berries.JPG"
                   data-lightbox="food"
                   data-title="📍 Booth @ Tiny Traders Village · Strawberries & Cream · Delicious treat! The strawberries were very fresh">
                    <img src="images/food/berries.JPG" alt="Strawberries with cream on top">
                </a>
                <figcaption>📍 Tiny Traders Village — Strawberries</figcaption>
            </figure>
        </div>

         <div class="mix week2 dessert inner-dublin">
            <figure>
                <a href="images/food/cinnamonroll1.JPG"
                   data-lightbox="food"
                   data-title="📍 Bounceback Cafe · Cinnamon Roll · As much as I loved the other food at this cafe, I'd pass on the cinnamon roll.">
                    <img src="images/food/cinnamonroll1.JPG" alt="Cinnamon roll with cream cheese frosting on top in brown box">
                </a>
                <figcaption>📍 Bounceback Cafe — Cinnamon Roll </figcaption>
            </figure>
        </div>

        <div class="mix week2 fried galway">
            <figure>
                <a href="images/food/pizza3.JPG"
                   data-lightbox="food"
                   data-title="📍 The Dough Bros · Bro's Marg · Honestly, one of the best pizzas I've ever had. Usually, I prefer a thicker crust but this was delicious. Also the only place I've visited with Ranch so +1">
                    <img src="images/food/pizza3.JPG" alt="Pepperoni Pizza">
                </a>
                <figcaption>📍 The Dough Bros — Bro's Marg </figcaption>
            </figure>
        </div>

        <div class="mix week2 drinks galway">
            <figure>
                <a href="images/food/acai-smoothie.JPG"
                   data-lightbox="food"
                   data-title="📍 Jungle Cafe · Acai Smoothie · This smoothie was amazing! I love the atmosphere of this restaurant, very tropical">
                    <img src="images/food/acai-smoothie.JPG" alt="Purple smoothie in a glass with a white straw. A strawberry and flower are on top">
                </a>
                <figcaption>📍 Jungle Cafe — Acai Smoothie </figcaption>
            </figure>
        </div>

        <div class="mix week2 sandwich galway">
            <figure>
                <a href="images/food/sandwich2.JPG"
                   data-lightbox="food"
                   data-title="📍 Jungle Cafe · Roast Chicken Sandwich · This sandwich was so good I went back the next day. Amazing! The brie on this sandwich is so good. I always love a Guarana as well.">
                    <img src="images/food/sandwich2.JPG" alt="Cut sandwich on a plate. A soda can and glass are in the background">
                </a>
                <figcaption>📍 Jungle Cafe — Roast Chicken Sandwich </figcaption>
            </figure>
        </div>

        <div class="mix week2 breakfast galway">
            <figure>
                <a href="images/food/pancakes2.JPG"
                   data-lightbox="food"
                   data-title="📍 Pascal · Roast Chicken Sandwich · Maybe it's just me but these pancakes were kind of burnt as well. The scrambled eggs were amazing though. Would come back and try other things on the menu">
                    <img src="images/food/pancakes2.JPG" alt="Glazed pancakes with caramel sauce and banana. A plate of scrambled eggs sits beside them.">
                </a>
                <figcaption>📍 Pascal — The Banoffee Stack </figcaption>
            </figure>
        </div>

         <div class="mix week3 mexican inner-dublin">
            <figure>
                <a href="images/food/burrito1.JPG"
                   data-lightbox="food"
                   data-title="📍 Bounceback Cafe · Burrito · Another amazing menu item from Bounceback! The portions were so good - watch out Chipotle">
                    <img src="images/food/burrito1.JPG" alt="Burrito on foil">
                </a>
                <figcaption>📍 Bounceback Cafe — Burrito </figcaption>
            </figure>
        </div>

        <div class="mix week3 drinks inner-dublin">
            <figure>
                <a href="images/food/cider.JPG"
                   data-lightbox="food"
                   data-title="📍 The Fourth Corner · Orchard Thieves Apple Cider · I usually detest anything beer/cider-y but I've fallen in love with Orchard Thieves and I will miss it. Angry Orchard does not compare">
                    <img src="images/food/cider.JPG" alt="A pint of cider">
                </a>
                <figcaption>📍 The Fourth Corner — Cider </figcaption>
            </figure>
        </div>

        <div class="mix week3 fried inner-dublin">
            <figure>
                <a href="images/food/burger1.JPG"
                   data-lightbox="food"
                   data-title="📍 Dash Burger @ The Fourth Corner · Dash Double Smash · Dash burgers are sold at The Fourth Corner and there's a great deal for burger+fries on Monday. This was delicious and definitely one of the best burgers I had in Dublin">
                    <img src="images/food/burger1.JPG" alt="Burger on a white plate with fries. A pint of cider in the background">
                </a>
                <figcaption>📍 Dash Burger — Dash Double Smash </figcaption>
            </figure>
        </div>

         <div class="mix week3 drinks inner-dublin">
            <figure>
                <a href="images/food/matcha.JPG"
                   data-lightbox="food"
                   data-title="📍 Cafe.28 · Matcha Latte · I'm not the biggest matcha fan but this was still pretty good. Just wished they had flavors like strawberry.">
                    <img src="images/food/matcha.JPG" alt="Matcha latte in plastic cup with a dome lid and black straw">
                </a>
                <figcaption>📍 Cafe.28 — Matcha Latte </figcaption>
            </figure>
        </div>

        <div class="mix week3 sandwich inner-dublin">
            <figure>
                <a href="images/food/sandwich3.JPG"
                   data-lightbox="food"
                   data-title="📍 Cafe.28 · Ham & Cheese Toastie · Delicious sandwich!">
                    <img src="images/food/sandwich3.JPG" alt="Ham and cheese toastie cut in half on a white plate">

            </figure>

            <figure>
                <a href="images/food/icecream.JPG"
                   data-lightbox="food"
                   data-title="📍 Murphy's Ice Cream · Mango Sorbet · This was delicious but very expensive">
                    <img src="images/food/icecream.JPG" alt="Mango sorbet in a cup with a white spoon in front of storefront">
                </a>
                <figcaption>📍 Murphy's Ice Cream — Mango Sorbet </figcaption>
