        <h1>Radharc Tíre</h1>
        <h2>Scenery</h2>

    <main id = "main">
    <div class="controls-wrap">
        <div class="filter-group">
            <h3>Show All</h3>
            <button type="button" class="control" data-filter="all">All</button>
        </div>

        <div class="filter-group">
            <details><summary><h3>Sort by Week</h3></summary>
            <button type="button" class="control" data-filter=".week1">Week 1</button>
            <button type="button" class="control" data-filter=".week2">Week 2</button>
            <button type="button" class="control" data-filter=".week3">Week 3</button>
            </details>
        </div>

        <div class="filter-group">
            <details><summary><h3>Sort by Place</h3></summary>
            <button type="button" class="control" data-filter=".inner-dublin">Inner Dublin</button>
            <button type="button" class="control" data-filter=".galway">Galway</button>
            <button type="button" class="control" data-filter=".howth">Howth</button>
            <button type="button" class="control" data-filter=".bray">Bray</button>
            <button type="button" class="control" data-filter=".belfast">Belfast</button>
            </details>
        </div>
    </div>

    <div class="container">

        <div class="mix week1 inner-dublin">
            <figure>
                <a href="images/scenery/trinity.JPG"
                   data-lightbox="scenery"
                   data-title="📍 Trinity College · As an enjoyer of the show Normal People, it was nice to see the entrance of Trinity in person. I couldn't imagine having so many tourists at my school though">
                    <img src="images/scenery/trinity.JPG" alt="Front of Trinity Collge with people standing around">
                </a>
                <figcaption>📍 Trinity College</figcaption>
            </figure>
        </div>

         <div class="mix week1 inner-dublin">
            <figure>
                <a href="images/scenery/audoen.JPG"
                   data-lightbox="scenery"
                   data-title="📍 St. Audeon's Church">
                    <img src="images/scenery/audoen.JPG" alt="Brick arch">
                </a>
                <figcaption>📍 St. Audeon's Church</figcaption>
            </figure>
        </div>

        <div class="mix week1 inner-dublin">
            <figure>
                <a href="images/scenery/heron.JPG"
                   data-lightbox="scenery"
                   data-title="📍 St. Stephen's Green · There was so much cool wildlife in this park. I met very friendly squirrels">
                    <img src="images/scenery/heron.JPG" alt="Heron standing in grass">
                </a>
                <figcaption>📍 St. Stephen's Green</figcaption>
            </figure>
        </div>

         <div class="mix week1 howth">
            <figure>
                <a href="images/scenery/howth1.JPG"
                   data-lightbox="scenery"
                   data-title="📍 Howth Cliff Walk · I loved this walk so much. I think it was my favorite place that I went in Ireland">
                    <img src="images/scenery/howth1.JPG" alt="Coastal landscape with a lighthouse and white house on a grassy cliff">
                </a>
                <figcaption>📍 Howth Cliff Walk</figcaption>
            </figure>
        </div>

        <div class="mix week1 howth">
            <figure>
                <a href="images/scenery/howth2.JPG"
                   data-lightbox="scenery"
                   data-title="📍 Howth Cliff Walk · I'm so glad I had my digital camera on this walk'">
                    <img src="images/scenery/howth2.JPG" alt="Coastal landscape with a rocky cliff with yellow flowered bushes">
                </a>
                <figcaption>📍 Howth Cliff Walk</figcaption>
            </figure>
        </div>

         <div class="mix week1 inner-dublin">
            <figure>
                <a href="images/scenery/docks.JPG"
                   data-lightbox="scenery"
                   data-title="📍 Samuel Beckett Bridge · The docks area of Dublin has definitely become my favorite'">
                    <img src="images/scenery/docks.JPG" alt="Modern cable-stayed bridge over water">
                </a>
                <figcaption>📍 Samuel Beckett Bridge</figcaption>
            </figure>
        </div>

         <div class="mix week2 galway">
            <figure>
                <a href="images/scenery/eyre.JPG"
                   data-lightbox="scenery"
                   data-title="📍 Eyre Square · I loved spending time here. It was still busy but not as massive as Dublin'">
                    <img src="images/scenery/eyre.JPG" alt="Narrow street with cloudy skies. Colorful flags hang from the building">
                </a>
                <figcaption>📍 Eyre Square</figcaption>
            </figure>
        </div>

         <div class="mix week2 galway">
            <figure>
                <a href="images/scenery/swan.JPG"
                   data-lightbox="scenery"
                   data-title="📍 Riverside Soundwalk · I learned what a mute swan is'">
                    <img src="images/scenery/swan.JPG" alt="White swan swimming in water">
                </a>
                <figcaption>📍 Riverside Soundwalk</figcaption>
            </figure>
        </div>

         <div class="mix week2 galway">
            <figure>
                <a href="images/scenery/moher1.JPG"
                   data-lightbox="scenery"
                   data-title="📍 Cliffs of Moher · Gorgeous but I wish it was a sunny day. The rain took away from the sites'">
                    <img src="images/scenery/moher1.JPG" alt="Coastal cliff in a cloudy sky">
                </a>
                <figcaption>📍 Cliffs of Moher</figcaption>
            </figure>
        </div>

        <div class="mix week2 galway">
            <figure>
                <a href="images/scenery/moher2.JPG"
                   data-lightbox="scenery"
                   data-title="📍 Cliffs of Moher">
                    <img src="images/scenery/moher2.JPG" alt="Stone castle turret in a cloudy sky">
                </a>
                <figcaption>📍 Cliffs of Moher</figcaption>
            </figure>
        </div>

        <div class="mix week2 galway">
            <figure>
                <a href="images/scenery/longwalk.JPG"
                   data-lightbox="scenery"
                   data-title="📍 The Long Walk">
                    <img src="images/scenery/longwalk.JPG" alt="Row of houses along a river">
                </a>
                <figcaption>📍 The Long Walk</figcaption>
            </figure>
        </div>

         <div class="mix week3 inner-dublin">
            <figure>
                <a href="images/scenery/templebar.JPG"
                   data-lightbox="scenery"
                   data-title="📍 Temple Bar · I did not go in but I had to go see the famous Temple Bar in person">
                    <img src="images/scenery/templebar.JPG" alt="Historic red pub surrounded by signs">
                </a>
                <figcaption>📍 Temple Bar</figcaption>
            </figure>
        </div>

        <div class="mix week3 bray">
            <figure>
                <a href="images/scenery/bray.JPG"
                   data-lightbox="scenery"
                   data-title="📍 Bray Seafront · I got some ice cream and enjoyed the walk. I had fun but it would have been better in nicer weather ">
                    <img src="images/scenery/bray.JPG" alt="Coastal promenade with a metal railing with a cloudy sky">
                </a>
                <figcaption>📍 Bray Seafront</figcaption>
            </figure>
        </div>

        <div class="mix week3 inner-dublin">
            <figure>
                <a href="images/scenery/dublinsky.JPG"
                   data-lightbox="scenery"
                   data-title="📍 Google Docks Roof · Seeing Dublin from above was amazing. Google employees are lucky">
                    <img src="images/scenery/dublinsky.JPG" alt="Aerial view of Dublin with an overcast sky">
                </a>
                <figcaption>📍 Google Docks Roof</figcaption>
            </figure>
        </div>

        <div class="mix week3 belfast">
            <figure>
                <a href="images/scenery/garden.JPG"
                   data-lightbox="scenery"
                   data-title="📍 Royal Botanic Gardens">
                    <img src="images/scenery/garden.JPG" alt="Green plants and trees inside a large, arched greenhouse">
                </a>
                <figcaption>📍 Royal Botanic Gardens</figcaption>
            </figure>
        </div>

         <div class="mix week3 belfast">
            <figure>
                <a href="images/scenery/street.JPG"
                   data-lightbox="scenery"
                   data-title="📍 Central Belfast - Botanic Avenue">
                    <img src="images/scenery/street.JPG" alt="Street with red brick row houses">
                </a>
                <figcaption>📍 Botanic Avenue</figcaption>
            </figure>
        </div>
