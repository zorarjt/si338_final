<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/page.css">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Signika:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/css/lightbox.min.css">
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <title>Músaeim — Museums</title>

<body>
    <a href="#main" class="skip">Skip to Main Content</a>
    
    <header>
        <nav>
            <a href="scenery.html" class="car-nav left">
                <span class="car-emoji">🚗</span>
                <span>Scenery</span>
            </a>
            <a href="index.html" class="corner-sign">
                <div class="info">
                    <div class="sign-inner">
                        <span class="title">Baile</span>
                        <span class="title-english">Home</span>
                    </div>
                </div>
            </a>
        </nav>
        <h1>Músaeim & Taispeántais</h1>
        <h2>Museums & Exhibitions</h2>
    </header>
    <main id = "main">
    <div class="controls-wrap">
        <div class="filter-group">
            <h3>Show All</h3>
            <button type="button" class="control" data-filter="all">All</button>
        </div>

        <div class="filter-group">
            <details><summary><h3>Sort by Week</h3></summary>
            <button type="button" class="control" data-filter=".week1">Week 1</button>
            <button type="button" class="control" data-filter=".week2">Week 2</button>
            <button type="button" class="control" data-filter=".week3">Week 3</button>
            </details>
        </div>

        <div class="filter-group">
            <details><summary><h3>Sort by Place</h3></summary>
            <button type="button" class="control" data-filter=".inner-dublin">Inner Dublin</button>
            <button type="button" class="control" data-filter=".galway">Galway</button>
            <button type="button" class="control" data-filter=".belfast">Belfast</button>
            </details>
        </div>

        <div class="filter-group">
            <details><summary><h3>Sort by Museum</h3></summary>
            <button type="button" class="control" data-filter=".gallery">National Gallery</button>
            <button type="button" class="control" data-filter=".museum">National Museum</button>
            <button type="button" class="control" data-filter=".epic">EPIC</button>
            <button type="button" class="control" data-filter=".computer">Computer Museum</button>
            <button type="button" class="control" data-filter=".city">Galway City Museum</button>
            <button type="button" class="control" data-filter=".obama">Obama Plaza</button>
            <button type="button" class="control" data-filter=".google">Accessibility Discovery Center</button>
            </details>
        </div>
    </div>

    <div class="container">

        <div class="mix week2 gallery inner-dublin">
            <figure>
                <a href="images/museums/gallery1.JPG"
                   data-lightbox="museums"
                   data-title="📍 National Gallery of Ireland · Triptych with the Crucifixion and Donors">
                    <img src="images/museums/gallery1.JPG" alt="Triptych art piece with vividly detailed religious scenes">
                </a>
                <figcaption>📍 National Gallery of Ireland</figcaption>
            </figure>
        </div>

        <div class="mix week2 gallery inner-dublin">
            <figure>
                <a href="images/museums/gallery2.JPG"
                   data-lightbox="museums"
                   data-title="📍 National Gallery of Ireland · Visual Poetry">
                    <img src="images/museums/gallery2.JPG" alt="Wall display titled 'Visual Poetry' about photographer John Minihan">
                </a>
                <figcaption>📍 National Gallery of Ireland</figcaption>
            </figure>
        </div>

        <div class="mix week2 gallery inner-dublin">
            <figure>
                <a href="images/museums/gallery3.JPG"

                   data-title="📍 National Gallery of Ireland · Entry to National Portrait Collection">
                    <img src="images/museums/gallery3.JPG" alt="Art gallery with a high, ornate ceiling">
                </a>
                <figcaption>📍 National Gallery of Ireland</figcaption>
            </figure>
        </div>

        <div class="mix week2 gallery inner-dublin">

                <a href="images/museums/gallery4.JPG"
                   data-lightbox="museums"
                   data-title="📍 National Gallery of Ireland · Crouching Venus">
                    <img src="images/museums/gallery4.JPG" alt="A marble statue of a kneeling woman with crossed arms">
                </a>
                <figcaption>📍 National Gallery of Ireland</figcaption>
            </figure>
        </div>

         <div class="mix week2 gallery inner-dublin">
            <figure>
                <a href="images/museums/gallery5.JPG"
                   data-lightbox="museums"
                   data-title="📍 National Gallery of Ireland · The Mother of Sorrows">

                </a>
                <figcaption>📍 National Gallery of Ireland</figcaption>
            </figure>
        </div>

        <div class="mix week2 museum inner-dublin">

                   data-lightbox="museums"

        <div class="mix week2 museum inner-dublin">

                </a>
