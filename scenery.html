    <link href="https://fonts.googleapis.com/css2?family=Signika:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/css/lightbox.min.css">
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">

<body>
    <a href="#main" class="skip">Skip to Main Content</a>
    
    <header>
        <nav>
            <a href="index.html" class="corner-sign">
                <div class="info">
                    <div class="sign-inner">
                        <span class="title">Baile</span>
                        <span class="title-english">Home</span>
                    </div>
                </div>
            </a>
        </nav>
        <h1>Radharc Tíre</h1>
        <h2>Scenery</h2>
    </header>
    <main id = "main">
    <div class="controls-wrap">
        <div class="filter-group">
            <h3>Show All</h3>
            <button type="button" class="control" data-filter="all">All</button>
        </div>

        <div class="filter-group">
            <details><summary><h3>Sort by Week</h3></summary>
            <button type="button" class="control" data-filter=".week1">Week 1</button>
            <button type="button" class="control" data-filter=".week2">Week 2</button>
            <button type="button" class="control" data-filter=".week3">Week 3</button>
            </details>
        </div>

        <div class="filter-group">
            <details><summary><h3>Sort by Place</h3></summary>
            <button type="button" class="control" data-filter=".inner-dublin">Inner Dublin</button>
            <button type="button" class="control" data-filter=".galway">Galway</button>
            <button type="button" class="control" data-filter=".howth">Howth</button>
            <button type="button" class="control" data-filter=".bray">Bray</button>
            <button type="button" class="control" data-filter=".belfast">Belfast</button>
            </details>
        </div>
    </div>

    <div class="container">

        <div class="mix week1 inner-dublin">
            <figure>
                <a href="images/scenery/trinity.JPG"
                   data-lightbox="scenery"
                   data-title="📍 Trinity College · As an enjoyer of the show Normal People, it was nice to see the entrance of Trinity in person. I couldn't imagine having so many tourists at my school though">
                    <img src="images/scenery/trinity.JPG" alt="Front of Trinity Collge with people standing around">
                </a>
                <figcaption>📍 Trinity College</figcaption>
            </figure>
        </div>

         <div class="mix week1 inner-dublin">
            <figure>
                <a href="images/scenery/audoen.JPG"
                   data-lightbox="scenery"
                   data-title="📍 St. Audeon's Church">
                    <img src="images/scenery/audoen.JPG" alt="Brick arch">
                </a>
                <figcaption>📍 St. Audeon's Church</figcaption>
            </figure>
        </div>

        <div class="mix week1 inner-dublin">
            <figure>
                <a href="images/scenery/heron.JPG"
                   data-lightbox="scenery"
                   data-title="📍 St. Stephen's Green · There was so much cool wildlife in this park. I met very friendly squirrels">
                    <img src="images/scenery/heron.JPG" alt="Heron standing in grass">
                </a>
                <figcaption>📍 St. Stephen's Green</figcaption>
            </figure>
        </div>

         <div class="mix week1 howth">
            <figure>
                <a href="images/scenery/howth1.JPG"
                   data-lightbox="scenery"
                   data-title="📍 Howth Cliff Walk · I loved this walk so much. I think it was my favorite place that I went in Ireland">
                    <img src="images/scenery/howth1.JPG" alt="Coastal landscape with a lighthouse and white house on a grassy cliff">
                </a>
                <figcaption>📍 Howth Cliff Walk</figcaption>
            </figure>
        </div>

        <div class="mix week1 howth">
            <figure>
                <a href="images/scenery/howth2.JPG"
                   data-lightbox="scenery"
                   data-title="📍 Howth Cliff Walk · I'm so glad I had my digital camera on this walk'">
                    <img src="images/scenery/howth2.JPG" alt="Coastal landscape with a rocky cliff with yellow flowered bushes">
                </a>
                <figcaption>📍 Howth Cliff Walk</figcaption>
            </figure>
        </div>

         <div class="mix week1 inner-dublin">
            <figure>
                <a href="images/scenery/docks.JPG"
                   data-lightbox="scenery"
                   data-title="📍 Samuel Beckett Bridge · The docks area of Dublin has definitely become my favorite'">
                    <img src="images/scenery/docks.JPG" alt="Modern cable-stayed bridge over water">
                </a>
                <figcaption>📍 Samuel Beckett Bridge</figcaption>
            </figure>
        </div>


    </div>
