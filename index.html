<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Signika:wght@300..700&display=swap" rel="stylesheet">
    <title>Adventures in Ireland</title>
</head>
<header class="header">
    <div class="zora-irish">Eachtraí Zora in Éirinn</div>
    <div class="zora">Zora's Adventures in Ireland</div>
    <img src="images/highwaysign.png" alt="Highway Sign">
</header>
<body>
    <div class="sign-hint">Click on a sign to learn more</div>
    <div class="timeline">
        <div class="outer">
            <div class="card">
                <div class="info">
                    <div class="sign-inner">
                        <h3 class="title">Bia</h3>
                        <div class="title-english">Food</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="info">
                    <div class="sign-inner">
                        <h3 class="title">Radharc Tíre</h3>
                        <div class="title-english">Scenery</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="info">
                    <div class="sign-inner">
                        <h3 class="title">Músaeim & Taispeántais</h3>
                        <div class="title-english">Museums & Exhibitions</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="info">
                    <div class="sign-inner">        
                        <h3 class="title">Gailearaí</h3>
                        <div class="title-english">Gallery</div>
                    </div>
                </div>
            </div>       
        </div>
    </div>

    <footer id="footer">
        <p>Created by Zora Tucker for SI 338 Spring 2026</p>
    </footer>
</body>
</html>
